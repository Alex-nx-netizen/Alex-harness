<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>HARNESS · Dashboard v2</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
<div id="app"></div>

<!-- preact + htm + app: single module chain ensures strict load order -->
<script type="module">
import { h, render, Fragment } from 'https://esm.sh/preact@10.22.0';
import { useState, useEffect, useMemo, useRef, useCallback } from 'https://esm.sh/preact@10.22.0/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
import { atom, computed } from 'https://esm.sh/nanostores@0.10.3';
import { useStore } from 'https://esm.sh/@nanostores/preact@0.5.1?deps=preact@10.22.0';

window.__h = h;
window.__render = render;
window.__html = htm.bind(h);
window.__hooks = { useState, useEffect, useMemo, useRef, useCallback };
window.__Fragment = Fragment;
window.__atom = atom;
window.__computed = computed;
window.__useStore = useStore;

// only NOW load app — guaranteed window.* is populated
await import('./src/app.js');
</script>
</body>
</html>
